<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Tool Pro | PDF 병합 & 나누기</title>
    <meta name="description" content="PDF 파일을 쉽고 안전하게 병합하거나 나누세요. 모든 처리는 브라우저에서 이루어집니다.">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>PDF Tool Pro</h1>
            <p>PDF 파일을 병합하거나 원하는 대로 나누세요.</p>
        </header>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="merge">📄 PDF 병합</button>
            <button class="tab-btn" data-tab="split">✂️ PDF 나누기</button>
        </div>

        <!-- 병합 탭 -->
        <main class="main-card" id="tab-merge">
            <div class="upload-zone" id="merge-drop-zone">
                <input type="file" id="merge-file-input" multiple accept="application/pdf">
                <span class="upload-icon">📄</span>
                <p>파일을 이리로 드래그하거나 <span>클릭하여 업로드</span>하세요</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem;">PDF 파일만 지원합니다</p>
            </div>

            <div class="file-list" id="merge-file-list"></div>

            <div class="action-bar" id="merge-action-bar" style="display: none;">
                <button class="btn btn-secondary" id="btn-clear">모두 삭제</button>
                <button class="btn btn-primary" id="btn-merge">
                    <span class="loader"></span>
                    <span class="btn-text">PDF 병합 및 저장</span>
                </button>
            </div>
        </main>

        <!-- 나누기 탭 -->
        <main class="main-card" id="tab-split" style="display: none;">
            <div class="upload-zone" id="split-drop-zone">
                <input type="file" id="split-file-input" accept="application/pdf">
                <span class="upload-icon">✂️</span>
                <p>나눌 PDF 파일을 드래그하거나 <span>클릭하여 업로드</span>하세요</p>
                <p style="font-size: 0.8rem; margin-top: 0.5rem;">PDF 파일 1개만 업로드하세요</p>
            </div>

            <div id="split-panel" style="display: none;">
                <div class="split-info">
                    <span class="file-icon">📄</span>
                    <div class="file-info">
                        <span class="file-name" id="split-file-name"></span>
                        <span class="file-size" id="split-page-count"></span>
                    </div>
                    <button class="btn-icon btn-remove" id="btn-split-reset">✕</button>
                </div>

                <div class="split-mode-selector">
                    <label class="mode-option">
                        <input type="radio" name="split-mode" value="ranges" checked>
                        <span>페이지 범위 지정</span>
                    </label>
                    <label class="mode-option">
                        <input type="radio" name="split-mode" value="all">
                        <span>페이지별로 전체 분리</span>
                    </label>
                </div>

                <div id="split-ranges-panel">
                    <p class="split-hint">쉼표(,)로 구분하여 범위를 입력하세요. 각 범위가 별도의 PDF로 저장됩니다.</p>
                    <p class="split-hint-example">예시: <code>1-3, 4-6, 7</code> → 3개의 PDF 생성</p>
                    <div class="ranges-input-wrap">
                        <input type="text" id="split-ranges-input" class="ranges-input" placeholder="예: 1-3, 4-6, 7">
                        <button class="btn btn-ghost" id="btn-add-range">+ 범위 추가</button>
                    </div>
                    <div id="range-tags" class="range-tags"></div>
                </div>

                <div class="action-bar" style="display: flex; margin-top: 1.5rem;">
                    <button class="btn btn-primary" id="btn-split">
                        <span class="loader"></span>
                        <span class="btn-text">PDF 나누기 및 저장</span>
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 PDF Tool Pro. All rights reserved. 브라우저에서 안전하게 실행됩니다.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
